spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    hibernate:
      # flyway가 테이블/초기 데이터를 생성하고 hibernate는 실제 validate만 수행
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
jwt:
  # jwt secret key (test 용)
  secret: 5VQQMfjGcREAKxUDV+5OTdFkrFl8L7521GqCeJVesE7ZsKbAUQLk6K45dQkwHmf2jJmpbaqODszgk0uKB3NziQ==

app:
  cookie:
    secure: true
  redirect:
    onboarding-uri: http://localhost:8080/onboarding
    login-success-uri: http://localhost:8080/oauth/callback?status=LOGIN_SUCCESS

oauth:
  google:
    client-id: test-client-id
    client-secret: test-client-secret
    redirect-uri: http://localhost:8080/api/auth/callback/GOOGLE
    authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
    token-uri: https://oauth2.googleapis.com/token
    jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs
    issuer-uris:
      - https://accounts.google.com
      - accounts.google.com
    scope: openid
  kakao:
    client-id: test-client-id
    client-secret: test-client-secret
    redirect-uri: http://localhost:8080/api/auth/callback/KAKAO
    authorization-uri: https://kauth.kakao.com/oauth/authorize
    token-uri: https://kauth.kakao.com/oauth/token
    jwk-set-uri: https://kauth.kakao.com/.well-known/jwks.json
    issuer-uri: https://kauth.kakao.com
    scope: openid
