spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    hibernate:
      # flyway가 테이블/초기 데이터를 생성하고 hibernate는 실제 validate만 수행
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    version: OPENAPI_3_0

server:
  env: test
  port: 8080
  serverAddress: localhost

serverName: test_server

jwt:
  # jwt secret key (test 용)
  secret: 5VQQMfjGcREAKxUDV+5OTdFkrFl8L7521GqCeJVesE7ZsKbAUQLk6K45dQkwHmf2jJmpbaqODszgk0uKB3NziQ==

app:
  cookie:
    secure: true
  openapi:
    title: am-i-hogu API
    version: v1
    server-uri: http://localhost:8080
  token-encryption:
    secret: 0SYHAlsZfTy7E4sI59brKOlP3PpK6WC8jvBdjNw8xOo=
  redirect:
    onboarding-uri: http://localhost:8080/onboarding
    login-success-uri: http://localhost:8080/oauth/callback?status=LOGIN_SUCCESS
    login-failure-uri: http://localhost:3000/oauth/callback?status=LOGIN_FAILED

cloud:
  aws:
    s3:
      bucket: test-bucket
    cloudfront:
      domain: https://test-cloudfront.example.com
    credentials:
      access-key: test-access-key
      secret-key: test-secret-key
    region:
      static: ap-northeast-2
      auto: false
    stack:
      auto: false

oauth:
  google:
    client-id: test-client-id
    client-secret: test-client-secret
    redirect-uri: http://localhost:8080/api/auth/callback/GOOGLE
    authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
    token-uri: https://oauth2.googleapis.com/token
    jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs
    issuer-uris:
      - https://accounts.google.com
      - accounts.google.com
    scope: openid
  kakao:
    client-id: test-client-id
    client-secret: test-client-secret
    redirect-uri: http://localhost:8080/api/auth/callback/KAKAO
    authorization-uri: https://kauth.kakao.com/oauth/authorize
    token-uri: https://kauth.kakao.com/oauth/token
    jwk-set-uri: https://kauth.kakao.com/.well-known/jwks.json
    issuer-uris:
      - https://kauth.kakao.com
    scope: openid
