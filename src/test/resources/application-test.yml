spring:
  datasource:
    # 테스트용 H2 인메모리 데이터베이스 사용
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop # 테스트마다 스키마 재생성
  flyway:
    enabled: false
jwt:
  # jwt secret key (test 용)
  secret: 5VQQMfjGcREAKxUDV+5OTdFkrFl8L7521GqCeJVesE7ZsKbAUQLk6K45dQkwHmf2jJmpbaqODszgk0uKB3NziQ==

app:
  cookie:
    secure: true
  redirect:
    onboarding-uri: http://localhost:8080/onboarding
    login-success-uri: http://localhost:8080/oauth/callback?status=LOGIN_SUCCESS

oauth:
  google:
    client-id: test-client-id
    client-secret: test-client-secret
    redirect-uri: http://localhost:8080/api/auth/callback/GOOGLE
    authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
    token-uri: https://oauth2.googleapis.com/token
    jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs
    issuer-uris:
      - https://accounts.google.com
      - accounts.goole.com
    scope: openid
