server:
  port: 8080
spring:
  application:
    name: am-i-hogu

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    # 로컬 MySQL 연결 설정
    url: jdbc:mysql://localhost:3306/${DB_NAME:hogu_db}?useUnicode=true&serverTimezone=Asia/Seoul
    username: root
    password: ${DB_ROOT_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # Flyway가 관리하는 스키마 검증
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    # 애플리케이션 시작 시 DB 마이그레이션 실행
    enabled: true
    locations: classpath:db/migration

jwt:
  # jwt secret key
  secret: ${JWT_SECRET}

app:
  cookie:
    secure: true
  token-encryption:
    secret: ${TOKEN_ENCRYPTION_SECRET}
  redirect:
    onboarding-uri: http://localhost:3000/onboarding
    login-success-uri: http://localhost:3000/oauth/callback?status=LOGIN_SUCCESS
    login-failure-uri: http://localhost:3000/oauth/callback?status=LOGIN_FAILED

oauth:
  # google 소셜 로그인 정보
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: http://localhost:8080/api/auth/callback/GOOGLE
    authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
    token-uri: https://oauth2.googleapis.com/token
    jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs
    issuer-uris:
      - https://accounts.google.com
      - accounts.google.com
    scope: openid
    authorization-params:
      access_type: offline

  # kakao 소셜 로그인 정보
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    redirect-uri: http://localhost:8080/api/auth/callback/KAKAO
    authorization-uri: https://kauth.kakao.com/oauth/authorize
    token-uri: https://kauth.kakao.com/oauth/token
    jwk-set-uri: https://kauth.kakao.com/.well-known/jwks.json
    issuer-uris:
      - https://kauth.kakao.com
    scope: openid


logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
