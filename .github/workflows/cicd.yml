name: CI/CD

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/am-i-hogu-api

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          printf '%s' "${{ secrets.APPLICATION_SECRET }}" | base64 --decode > ./src/main/resources/application-secret.yml
          chmod +x ./gradlew
          ./gradlew clean build --no-daemon

      - name: Login to DockerHub
        # main 브랜치인 경우에만 실행
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        # main 브랜치인 경우에만 실행
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker build --platform linux/amd64 -t $IMAGE_NAME:latest .
          docker push $IMAGE_NAME:latest

  deploy:
    needs: build
    # main 브랜치인 경우에만 실행
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Set target server
        run: |
          HEALTH_URL="${{ secrets.API_BASE_URL }}/api/health"

          if curl -fsS "$HEALTH_URL" > health.json; then
            CURRENT_UPSTREAM=$(python3 -c 'import json; print(json.load(open("health.json"))["env"])')
          else
            CURRENT_UPSTREAM=green
          fi

          echo "CURRENT_UPSTREAM=$CURRENT_UPSTREAM" >> $GITHUB_ENV

          if [ "$CURRENT_UPSTREAM" = "blue" ]; then
            echo "CURRENT_PORT=8080" >> $GITHUB_ENV
            echo "TARGET_PORT=8081" >> $GITHUB_ENV
            echo "TARGET_UPSTREAM=green" >> $GITHUB_ENV
          elif [ "$CURRENT_UPSTREAM" = "green" ]; then
            echo "CURRENT_PORT=8081" >> $GITHUB_ENV
            echo "TARGET_PORT=8080" >> $GITHUB_ENV
            echo "TARGET_UPSTREAM=blue" >> $GITHUB_ENV
          else
            echo "Invalid upstream: $CURRENT_UPSTREAM"
            exit 1
          fi

      - name: Run target container
        uses: appleboy/ssh-action@v1.0.3
        with:
          username: ubuntu
          host: ${{ secrets.AM_I_HOGU_SERVER_IP }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            sudo docker pull ${{ env.IMAGE_NAME }}:latest
            sudo docker compose -p am-i-hogu-${{ env.TARGET_UPSTREAM }} -f docker-compose-${{ env.TARGET_UPSTREAM }}.yml up -d

      - name: Check target server
        uses: appleboy/ssh-action@v1.0.3
        with:
          username: ubuntu
          host: ${{ secrets.AM_I_HOGU_SERVER_IP }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            for i in 1 2 3 4 5; do
              if curl -fsS http://localhost:${{ env.TARGET_PORT }}/api/health; then
                echo "Target server is healthy"
                exit 0
              fi

              echo "Health check failed. Retrying..."
              sleep 10
            done

            echo "Target server health check failed"
            exit 1

      - name: Change nginx upstream
        uses: appleboy/ssh-action@v1.0.3
        with:
          username: ubuntu
          host: ${{ secrets.AM_I_HOGU_SERVER_IP }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e
      
            if [ "${{ env.TARGET_UPSTREAM }}" = "blue" ]; then
              TARGET_SERVICE_URL="blue:8080"
            else
              TARGET_SERVICE_URL="green:8081"
            fi
      
            echo "TARGET_SERVICE_URL=$TARGET_SERVICE_URL"
      
            sudo docker exec -i nginx-server sh -c "echo 'set \$service_url $TARGET_SERVICE_URL;' > /etc/nginx/conf.d/service-env.inc"
            sudo docker exec nginx-server cat /etc/nginx/conf.d/service-env.inc
            sudo docker exec nginx-server nginx -t
            sudo docker exec nginx-server nginx -s reload
            
      - name: Check production server
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS "${{ secrets.API_BASE_URL }}/api/health"; then
              echo "Production server is healthy"
              exit 0
            fi

            echo "Production health check failed. Retrying..."
            sleep 10
          done

          echo "Production server health check failed"
          exit 1

      - name: Stop previous container
        uses: appleboy/ssh-action@v1.0.3
        with:
          username: ubuntu
          host: ${{ secrets.AM_I_HOGU_SERVER_IP }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            sudo docker stop ${{ env.CURRENT_UPSTREAM }} || true
            sudo docker rm ${{ env.CURRENT_UPSTREAM }} || true
